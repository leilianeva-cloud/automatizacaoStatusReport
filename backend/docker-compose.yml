services:
  # ─── MySQL ──────────────────────────────────────────
  db:
    build:
      context: ./db
    container_name: hapvida_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hapvida_net

  # ─── Express API ────────────────────────────────────
  server:
    build:
      context: ./server
    container_name: hapvida_server
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - hapvida_net

  # ─── React (Nginx) ──────────────────────────────────
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    container_name: hapvida_client
    restart: unless-stopped
    env_file: .env
    # depends_on:
    #   - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - hapvida_net

  # ─── Certbot ────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: hapvida_certbot
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - client
    networks:
      - hapvida_net

volumes:
  db_data:
  letsencrypt:
  certbot_www:

networks:
  hapvida_net:
    driver: bridge
